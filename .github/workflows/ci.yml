name: CI — Streamify Data Warehouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pandas scikit-learn joblib numpy

      - name: Run churn model tests
        run: pytest tests/test_churn_model.py -v
