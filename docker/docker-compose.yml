services:
  sqlserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: streamify_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "${SA_PASSWORD}", "-No", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  sqlserver_data:
